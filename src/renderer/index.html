<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- タイトルバー -->
    <header class="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">Font Viewer</span>
        <div class="view-tabs">
          <button class="view-tab active" data-view="detail">詳細</button>
          <button class="view-tab" data-view="catalog">一覧</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="テーマ切替">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <div class="main-layout">
      <!-- サイドバー -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <!-- 検索 -->
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="フォント名で検索...">
            <button class="search-clear" id="searchClear" title="クリア">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <!-- フィルター -->
          <div class="filter-bar">
            <button class="filter-pill" data-filter="favorites">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              お気に入り
            </button>
            <button class="filter-pill" data-filter="japanese">日本語</button>
            <button class="filter-pill" data-filter="monospace">等幅</button>
            <button class="filter-pill" data-filter="proportional">プロポーショナル</button>
          </div>

          <div class="font-count">
            <span id="fontCount">0</span> フォント
          </div>
        </div>

        <!-- フォントリスト（仮想スクロール） -->
        <div class="font-list-container" id="fontListContainer">
          <div class="font-list-inner" id="fontListInner"></div>
        </div>

        <!-- ローディング -->
        <div class="loading-overlay" id="loading">
          <div class="spinner"></div>
          <span>フォントを読み込み中...</span>
        </div>
      </aside>

      <!-- 一覧ビュー -->
      <div class="catalog-view" id="catalogView" style="display:none;">
        <div class="catalog-toolbar">
          <div class="search-box catalog-search">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="catalogSearchInput" placeholder="フォント名で検索...">
            <button class="search-clear" id="catalogSearchClear" title="クリア">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <div class="filter-bar catalog-filters">
            <button class="filter-pill" data-catalog-filter="favorites">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              お気に入り
            </button>
            <button class="filter-pill" data-catalog-filter="japanese">日本語</button>
            <button class="filter-pill" data-catalog-filter="monospace">等幅</button>
            <button class="filter-pill" data-catalog-filter="proportional">プロポーショナル</button>
          </div>
          <div class="catalog-controls">
            <input type="text" id="catalogText" class="preview-input" value="あいうえお ABC abc 0123456789">
            <div class="size-control">
              <input type="range" id="catalogFontSize" min="12" max="80" value="28">
              <span class="size-value" id="catalogFontSizeValue">28px</span>
            </div>
            <div class="font-count"><span id="catalogFontCount">0</span> フォント</div>
          </div>
        </div>
        <div class="catalog-list-container" id="catalogListContainer">
          <div class="catalog-list-inner" id="catalogListInner"></div>
        </div>
      </div>

      <!-- リサイズハンドル -->
      <div class="resize-handle" id="resizeHandle"></div>

      <!-- プレビューパネル -->
      <main class="preview-panel" id="previewPanel">
        <!-- 未選択状態 -->
        <div class="empty-state" id="emptyState">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
          <p>左のリストからフォントを選択してください</p>
          <span class="empty-hint">上下キーで移動、Enterで選択</span>
        </div>

        <!-- プレビューコンテンツ -->
        <div class="preview-content" id="previewContent" style="display:none;">
          <!-- プレビューヘッダー -->
          <div class="preview-header">
            <h2 id="selectedFontName"></h2>
            <div class="preview-actions">
              <button class="action-btn" id="favoriteBtn" title="お気に入り">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
              </button>
              <button class="action-btn" id="copyBtn" title="フォント名をコピー">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                <span class="copy-label">コピー</span>
              </button>
            </div>
          </div>

          <!-- コントロール -->
          <div class="preview-controls">
            <div class="control-row">
              <input type="text" id="previewText" class="preview-input" value="あいうえお ABC abc 0123456789">
              <div class="size-control">
                <input type="range" id="fontSize" min="8" max="128" value="36">
                <span class="size-value" id="fontSizeValue">36px</span>
              </div>
            </div>
          </div>

          <!-- メインプレビュー -->
          <div class="card main-preview-card">
            <div id="customPreview" class="main-preview-text"></div>
          </div>

          <!-- サイズバリエーション -->
          <div class="card">
            <h3 class="card-title">サイズバリエーション</h3>
            <div id="sizeSamples"></div>
          </div>

          <!-- ウェイト＆スタイル -->
          <div class="card">
            <h3 class="card-title">ウェイト & スタイル</h3>
            <div id="styleSamples"></div>
          </div>

          <!-- 文字セット -->
          <div class="card">
            <h3 class="card-title">文字セット</h3>
            <div id="charsetSamples"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
